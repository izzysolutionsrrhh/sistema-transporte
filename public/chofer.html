<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Recorridos - Chofer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --azul: #1d4ed8;
      --azul-claro: #eff6ff;
      --verde: #15803d;
      --verde-claro: #f0fdf4;
      --rojo: #dc2626;
      --rojo-claro: #fef2f2;
      --naranja: #d97706;
      --gris: #6b7280;
      --gris-claro: #f1f5f9;
      --texto: #1e293b;
      --borde: #e2e8f0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--gris-claro);
      color: var(--texto);
      min-height: 100dvh;
    }

    /* ── BLOQUEO HORARIO ─────────────────────────────── */
    #pantalla-bloqueada {
      position: fixed;
      inset: 0;
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      text-align: center;
      padding: 32px 24px;
      gap: 16px;
    }
    #pantalla-bloqueada .bloqueo-icono { font-size: 64px; }
    #pantalla-bloqueada h2 { font-size: 22px; font-weight: 700; margin: 0; }
    #pantalla-bloqueada .bloqueo-horario {
      font-size: 15px; color: #94a3b8; margin: 0;
    }
    #pantalla-bloqueada .bloqueo-reloj {
      font-size: 48px; font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: 2px;
      color: #38bdf8;
    }
    #pantalla-bloqueada .bloqueo-cuenta {
      font-size: 14px; color: #64748b;
    }

    /* ── BANNER OFFLINE ──────────────────────────────── */
    #banner-offline {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: #dc2626;
      color: white;
      text-align: center;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 700;
      z-index: 200;
    }

    /* ── MODAL ───────────────────────────────────────── */
    #modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
    }
    #modal-box {
      background: white;
      border-radius: 16px;
      padding: 24px;
      max-width: 320px;
      width: 100%;
    }
    #modal-msg {
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 20px;
      text-align: center;
      color: var(--texto);
    }
    .modal-btns { display: flex; gap: 10px; }
    .btn-modal-cancel {
      flex: 1; padding: 14px;
      background: var(--gris-claro); color: var(--texto);
      border: none; border-radius: 10px;
      font-size: 16px; font-weight: 700; cursor: pointer;
    }
    .btn-modal-ok {
      flex: 1; padding: 14px;
      background: var(--verde); color: white;
      border: none; border-radius: 10px;
      font-size: 16px; font-weight: 700; cursor: pointer;
    }
    .btn-modal-ok.rojo { background: var(--rojo); }

    /* ── PANTALLA CÓDIGO ─────────────────────────────── */
    #screen-codigo {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      background: white;
    }

    #screen-codigo .icono { font-size: 72px; margin-bottom: 16px; }
    #screen-codigo h1 { font-size: 26px; font-weight: 700; text-align: center; margin-bottom: 8px; }
    #screen-codigo p { color: var(--gris); text-align: center; margin-bottom: 32px; font-size: 16px; }

    .campo {
      width: 100%; max-width: 320px;
      padding: 16px; font-size: 24px; font-weight: 700;
      text-align: center; letter-spacing: 4px;
      border: 2px solid var(--borde); border-radius: 12px;
      outline: none; text-transform: uppercase; margin-bottom: 16px;
    }
    .campo:focus { border-color: var(--azul); }

    #error-codigo {
      color: var(--rojo); font-size: 14px; text-align: center;
      min-height: 20px; margin-bottom: 12px;
    }

    /* ── BOTONES ──────────────────────────────────────── */
    .btn {
      display: block; width: 100%; max-width: 320px;
      padding: 18px; font-size: 18px; font-weight: 700;
      border: none; border-radius: 12px; cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.97); opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-azul  { background: var(--azul); color: white; }
    .btn-verde { background: var(--verde); color: white; }
    .btn-rojo  { background: var(--rojo); color: white; }
    .btn-rojo-outline {
      background: transparent; color: var(--rojo);
      border: 2px solid var(--rojo);
    }

    /* ── PANTALLA RECORRIDO ───────────────────────────── */
    #screen-recorrido { display: none; flex-direction: column; min-height: 100dvh; }

    header.top {
      background: white; padding: 16px 20px 12px;
      border-bottom: 1px solid var(--borde);
      position: sticky; top: 0; z-index: 10;
    }

    .header-row {
      display: flex; align-items: center;
      justify-content: space-between; gap: 8px;
    }

    #nombre-recorrido { font-size: 20px; font-weight: 700; flex: 1; }

    .badge {
      font-size: 12px; font-weight: 700; padding: 4px 10px;
      border-radius: 20px; white-space: nowrap; flex-shrink: 0;
    }
    .badge-pendiente    { background: #f1f5f9; color: var(--gris); }
    .badge-en_recorrido { background: #fef3c7; color: #92400e; }
    .badge-completado   { background: #dcfce7; color: #14532d; }
    .badge-no_asistio   { background: #fee2e2; color: #991b1b; }

    #progreso-texto { font-size: 14px; color: var(--gris); margin-top: 6px; }

    .barra-outer {
      height: 6px; background: var(--borde);
      border-radius: 4px; margin-top: 6px; overflow: hidden;
    }
    #barra-progreso {
      height: 100%; background: var(--verde);
      border-radius: 4px; transition: width 0.4s ease; width: 0%;
    }

    /* ── CUERPO SCROLL ────────────────────────────────── */
    .cuerpo { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 100px; }

    /* ── ACCIONES DE INICIO ───────────────────────────── */
    #bloque-inicio {
      display: flex; flex-direction: column; gap: 12px;
      align-items: center; margin-bottom: 24px;
    }

    /* ── LISTA PASAJEROS ──────────────────────────────── */
    #lista-pasajeros { list-style: none; display: flex; flex-direction: column; gap: 10px; }

    .item-pasajero {
      background: white; border-radius: 12px; padding: 14px 16px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; border: 2px solid var(--borde); transition: border-color 0.2s;
    }
    .item-pasajero.recogido { border-color: var(--verde); background: var(--verde-claro); }
    .item-pasajero.no-estaba { border-color: var(--rojo); background: var(--rojo-claro); }
    .item-pasajero.aviso { border-color: #7c3aed; background: #f5f3ff; opacity: 0.85; }

    .pasajero-info { flex: 1; min-width: 0; }

    .pasajero-nombre {
      font-size: 18px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .pasajero-sublinea { font-size: 12px; font-weight: 600; margin-top: 2px; }

    .acciones-pasajero { display: flex; gap: 6px; flex-shrink: 0; }

    /* Botones de marcado — siempre en outline; .sel = seleccionado/relleno */
    .btn-marcar {
      padding: 10px 16px; font-size: 18px; font-weight: 700;
      border: 2px solid; border-radius: 8px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s, transform 0.1s;
      background: transparent;
    }
    .btn-marcar:active { transform: scale(0.93); opacity: 0.8; }

    .btn-marcar.recogido  { color: var(--verde); border-color: var(--verde); }
    .btn-marcar.no-estaba { color: var(--rojo);  border-color: var(--rojo); }
    .btn-marcar.aviso     { color: #7c3aed;       border-color: #7c3aed; }

    .btn-marcar.recogido.sel  { background: var(--verde); color: white; }
    .btn-marcar.no-estaba.sel { background: var(--rojo);  color: white; }
    .btn-marcar.aviso.sel     { background: #7c3aed;       color: white; }

    .resultado-pasajero { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .resultado-pasajero .icono-resultado { font-size: 22px; }
    .resultado-pasajero .hora-resultado  { font-size: 12px; color: var(--gris); }

    /* ── FOOTER FIJO ──────────────────────────────────── */
    .footer-fijo {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: white; border-top: 1px solid var(--borde);
      padding: 12px 20px 20px;
    }

    /* ── MENSAJE ESTADO ───────────────────────────────── */
    .mensaje-estado {
      background: white; border-radius: 12px; padding: 20px;
      text-align: center; border: 2px solid var(--borde); margin-bottom: 16px;
    }
    .mensaje-estado .estado-icono { font-size: 48px; margin-bottom: 8px; }
    .mensaje-estado h3 { font-size: 20px; margin-bottom: 4px; }
    .mensaje-estado p { color: var(--gris); font-size: 14px; }

    .hidden { display: none !important; }

    /* ── BARRA ACCIONES HEADER ──────────────────────────── */
    .header-acciones { display: flex; justify-content: space-between; margin-top: 10px; }

    .btn-header-sm {
      background: none; border: none; font-size: 13px; font-weight: 700;
      color: var(--azul); cursor: pointer; padding: 2px 0;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-header-sm.rojo { color: var(--rojo); }

    /* ── PANTALLA HISTORIAL ───────────────────────────────── */
    #screen-historial { display: none; flex-direction: column; min-height: 100dvh; }

    .sesion-card {
      background: white; border-radius: 12px; border: 2px solid var(--borde);
      margin-bottom: 12px; overflow: hidden;
    }
    .sesion-card-header {
      padding: 14px 16px; display: flex; justify-content: space-between;
      align-items: flex-start; cursor: pointer; user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .sesion-fecha  { font-size: 16px; font-weight: 700; }
    .sesion-stats  { font-size: 13px; color: var(--gris); margin-top: 3px; }
    .sesion-badge  { font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 20px; flex-shrink: 0; }
    .sesion-detalle { display: none; border-top: 1px solid var(--borde); padding: 10px 16px; }
    .sesion-detalle.abierto { display: block; }
    .sesion-pasajero-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 7px 0; font-size: 14px; border-bottom: 1px solid var(--borde);
    }
    .sesion-pasajero-row:last-child { border-bottom: none; }
  </style>
</head>
<body>

<!-- Bloqueo de horario -->
<div id="pantalla-bloqueada" class="hidden">
  <div class="bloqueo-icono">🔒</div>
  <h2>Sistema no disponible</h2>
  <p class="bloqueo-horario">Disponible únicamente de <strong>1:00 am</strong> a <strong>4:00 am</strong> (hora Lima)</p>
  <div class="bloqueo-reloj" id="bloqueo-reloj">--:--:--</div>
  <p class="bloqueo-cuenta" id="bloqueo-cuenta"></p>
</div>

<!-- Banner offline (hidden by default) -->
<div id="banner-offline" class="hidden">⚠️ Sin conexión — los cambios no se están guardando</div>

<!-- Modal de confirmación -->
<div id="modal-overlay" class="hidden">
  <div id="modal-box">
    <p id="modal-msg"></p>
    <div class="modal-btns">
      <button class="btn-modal-cancel" id="modal-cancelar">Cancelar</button>
      <button class="btn-modal-ok" id="modal-ok">Confirmar</button>
    </div>
  </div>
</div>

<!-- ─── PANTALLA 1: CÓDIGO ─────────────────────────────────── -->
<div id="screen-codigo">
  <div class="icono">🚌</div>
  <h1>Sistema de Recorridos</h1>
  <p>Ingresá la placa de tu auto</p>
  <input id="input-codigo" class="campo" type="text" placeholder="Ej: ABC123"
         maxlength="10" autocomplete="off" autocorrect="off" spellcheck="false">
  <div id="error-codigo"></div>
  <button id="btn-ingresar" class="btn btn-azul">Entrar</button>
</div>

<!-- ─── PANTALLA 2: RECORRIDO ──────────────────────────────── -->
<div id="screen-recorrido">
  <header class="top">
    <div class="header-row">
      <span id="nombre-recorrido">Recorrido</span>
      <span id="badge-estado" class="badge badge-pendiente">Pendiente</span>
    </div>
    <div id="progreso-texto">Cargando...</div>
    <div class="barra-outer"><div id="barra-progreso"></div></div>
    <div class="header-acciones">
      <button class="btn-header-sm" onclick="verHistorial()">📋 Ver historial</button>
      <button class="btn-header-sm rojo" onclick="salir()">Salir ✕</button>
    </div>
  </header>

  <div class="cuerpo">
    <div id="bloque-inicio">
      <button id="btn-iniciar" class="btn btn-verde">Iniciar Recorrido</button>
      <button id="btn-no-asistir" class="btn btn-rojo-outline">No voy a asistir hoy</button>
    </div>
    <div id="bloque-mensaje" class="hidden"></div>
    <ul id="lista-pasajeros"></ul>
  </div>

  <div class="footer-fijo hidden" id="footer-llegada">
    <button id="btn-llegar" class="btn btn-verde">✅ Llegué a la Oficina</button>
  </div>
</div>

<!-- ─── PANTALLA 3: HISTORIAL ──────────────────────────────── -->
<div id="screen-historial">
  <header class="top">
    <div class="header-row">
      <button class="btn-header-sm" onclick="volverDesdeHistorial()" style="font-size:16px">← Volver</button>
      <span style="font-size:18px;font-weight:700">Historial</span>
      <span></span>
    </div>
  </header>
  <div class="cuerpo" id="contenido-historial">
    <p style="text-align:center;color:var(--gris);padding:40px 0">Cargando...</p>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let estado = null;

  const $ = id => document.getElementById(id);

  // ── BLOQUEO DE HORARIO (1am – 4am Lima) ────────────────────
  function horaLima() {
    const ahora = new Date();
    const h = parseInt(new Intl.DateTimeFormat('es-PE', { timeZone: 'America/Lima', hour: 'numeric', hour12: false }).format(ahora));
    const m = parseInt(new Intl.DateTimeFormat('es-PE', { timeZone: 'America/Lima', minute: 'numeric' }).format(ahora));
    const s = parseInt(new Intl.DateTimeFormat('es-PE', { timeZone: 'America/Lima', second: 'numeric' }).format(ahora));
    return { h, m, s };
  }

  function estaEnHorario() {
    const { h } = horaLima();
    return h >= 1 && h < 4;
  }

  function minutosHasta1am() {
    const { h, m, s } = horaLima();
    const totalSeg = h * 3600 + m * 60 + s;
    const objetivo = 1 * 3600; // 1:00am
    const diff = totalSeg < objetivo ? objetivo - totalSeg : (24 * 3600) - totalSeg + objetivo;
    const hh = Math.floor(diff / 3600);
    const mm = Math.floor((diff % 3600) / 60);
    const ss = diff % 60;
    return `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
  }

  function actualizarBloqueo() {
    const { h, m, s } = horaLima();
    const reloj = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    $('bloqueo-reloj').textContent = reloj;

    if (estaEnHorario()) {
      $('pantalla-bloqueada').classList.add('hidden');
    } else {
      $('pantalla-bloqueada').classList.remove('hidden');
      $('bloqueo-cuenta').textContent = `Abre en ${minutosHasta1am()}`;
    }
  }

  actualizarBloqueo();
  setInterval(actualizarBloqueo, 1000);

  // ── MODAL ───────────────────────────────────────────────────
  let _modalCb = null;

  function confirmar(msg, onSi, { esRojo = false } = {}) {
    $('modal-msg').textContent = msg;
    $('modal-ok').className = `btn-modal-ok${esRojo ? ' rojo' : ''}`;
    _modalCb = onSi;
    $('modal-overlay').classList.remove('hidden');
  }

  function cerrarModal() {
    $('modal-overlay').classList.add('hidden');
    _modalCb = null;
  }

  $('modal-cancelar').addEventListener('click', cerrarModal);
  $('modal-ok').addEventListener('click', () => {
    const cb = _modalCb;
    cerrarModal();
    if (cb) cb();
  });

  // ── OFFLINE / RECONEXIÓN ────────────────────────────────────
  let _huboDesconexion = false;

  socket.on('disconnect', () => {
    _huboDesconexion = true;
    $('banner-offline').classList.remove('hidden');
  });

  socket.on('connect', async () => {
    if (!_huboDesconexion) return;
    $('banner-offline').classList.add('hidden');
    if (estado) {
      socket.emit('join_recorrido', { codigo: estado.recorrido.codigo });
      try {
        const res = await fetch(`/api/recorrido/${estado.recorrido.codigo}`);
        if (res.ok) { estado = await res.json(); renderizarEstado(); }
      } catch {}
    }
  });

  // ── PANTALLA DE CÓDIGO ──────────────────────────────────────
  $('input-codigo').addEventListener('keydown', e => {
    if (e.key === 'Enter') ingresar();
  });

  $('btn-ingresar').addEventListener('click', ingresar);

  async function ingresar() {
    const codigo = $('input-codigo').value.trim().toUpperCase();
    if (!codigo) return mostrarError('Ingresá el código del recorrido');

    $('btn-ingresar').disabled = true;
    $('error-codigo').textContent = '';

    try {
      const res = await fetch(`/api/recorrido/${codigo}`);
      if (!res.ok) {
        mostrarError('Placa no encontrada. Verificá con la oficina.');
        return;
      }
      estado = await res.json();
      localStorage.setItem('codigo', codigo);
      socket.emit('join_recorrido', { codigo });
      mostrarPantallaRecorrido();
    } catch {
      mostrarError('Error de conexión. Verificá tu internet.');
    } finally {
      $('btn-ingresar').disabled = false;
    }
  }

  function mostrarError(msg) {
    $('error-codigo').textContent = msg;
  }

  // ── PANTALLA DE RECORRIDO ───────────────────────────────────
  function mostrarPantallaRecorrido() {
    $('screen-codigo').style.display = 'none';
    $('screen-recorrido').style.display = 'flex';
    renderizarEstado();
  }

  function renderizarEstado() {
    if (!estado) return;
    const { recorrido, pasajeros, sesion, retiros } = estado;
    const estadoSesion = sesion?.estado || 'pendiente';

    $('nombre-recorrido').textContent = recorrido.nombre;

    const badgeTextos = {
      pendiente:    'Pendiente',
      en_recorrido: 'En Recorrido',
      completado:   '✓ Llegó',
      no_asistio:   'No Asistió',
    };
    const badge = $('badge-estado');
    badge.textContent = badgeTextos[estadoSesion] || 'Pendiente';
    badge.className = `badge badge-${estadoSesion}`;

    const recogidos  = retiros.filter(r => r.tipo === 'recogido').length;
    const noEstaban  = retiros.filter(r => r.tipo === 'no_estaba').length;
    const avisos     = retiros.filter(r => r.tipo === 'aviso').length;
    const procesados = retiros.length;
    const total = pasajeros.length;
    const partes = [];
    if (recogidos) partes.push(`${recogidos} recogido${recogidos !== 1 ? 's' : ''}`);
    if (noEstaban) partes.push(`${noEstaban} no estaba${noEstaban !== 1 ? 'n' : ''}`);
    if (avisos)    partes.push(`${avisos} avisó que no va`);
    $('progreso-texto').textContent = partes.length
      ? `${partes.join(', ')} de ${total}`
      : `0 de ${total} persona${total !== 1 ? 's' : ''}`;
    $('barra-progreso').style.width = total ? `${(procesados / total) * 100}%` : '0%';

    const bloqueInicio  = $('bloque-inicio');
    const bloqueMensaje = $('bloque-mensaje');
    const footerLlegada = $('footer-llegada');

    bloqueInicio.classList.add('hidden');
    bloqueMensaje.classList.add('hidden');
    footerLlegada.classList.add('hidden');

    if (estadoSesion === 'pendiente') {
      bloqueInicio.classList.remove('hidden');
    } else if (estadoSesion === 'en_recorrido') {
      footerLlegada.classList.remove('hidden');
    } else if (estadoSesion === 'completado') {
      bloqueMensaje.classList.remove('hidden');
      bloqueMensaje.innerHTML = `
        <div class="mensaje-estado">
          <div class="estado-icono">🎉</div>
          <h3>¡Llegaste a la oficina!</h3>
          <p>Hora de llegada: <strong>${sesion.hora_llegada}</strong></p>
          <p style="margin-top:4px">${recogidos} persona${recogidos !== 1 ? 's' : ''} traída${recogidos !== 1 ? 's' : ''}</p>
        </div>`;
    } else if (estadoSesion === 'no_asistio') {
      bloqueMensaje.classList.remove('hidden');
      bloqueMensaje.innerHTML = `
        <div class="mensaje-estado">
          <div class="estado-icono">❌</div>
          <h3>Marcado como no asistió</h3>
          <p>La oficina fue notificada. Si es un error, contactate con administración.</p>
        </div>`;
    }

    // Lista de pasajeros
    const lista = $('lista-pasajeros');
    lista.innerHTML = '';
    const marcados = {};
    retiros.forEach(r => { marcados[r.pasajero_id] = r; });

    const enRecorrido = estadoSesion === 'en_recorrido';

    pasajeros.forEach(p => {
      const marcado   = marcados[p.id];
      const esRecogido = marcado?.tipo === 'recogido';
      const esNoEstaba = marcado?.tipo === 'no_estaba';
      const esAviso    = marcado?.tipo === 'aviso';

      const li = document.createElement('li');
      li.className = `item-pasajero${esRecogido ? ' recogido' : esNoEstaba ? ' no-estaba' : esAviso ? ' aviso' : ''}`;

      let accionHTML;
      if (enRecorrido) {
        // Siempre mostrar los 3 botones; el marcado actual queda con fondo sólido (.sel)
        accionHTML = `<div class="acciones-pasajero">
          <button class="btn-marcar recogido${esRecogido ? ' sel' : ''}" data-id="${p.id}" data-tipo="recogido" title="Recogido">✓</button>
          <button class="btn-marcar no-estaba${esNoEstaba ? ' sel' : ''}" data-id="${p.id}" data-tipo="no_estaba" title="No estaba">✗</button>
          <button class="btn-marcar aviso${esAviso ? ' sel' : ''}" data-id="${p.id}" data-tipo="aviso" title="Avisó que no va">📵</button>
        </div>`;
      } else if (esRecogido) {
        accionHTML = `<div class="resultado-pasajero">
          <span class="icono-resultado" style="color:var(--verde)">✓</span>
          <span class="hora-resultado">${marcado.hora}</span>
        </div>`;
      } else if (esNoEstaba) {
        accionHTML = `<div class="resultado-pasajero">
          <span class="icono-resultado" style="color:var(--rojo)">✗</span>
          <span class="hora-resultado">No estaba</span>
        </div>`;
      } else if (esAviso) {
        accionHTML = `<div class="resultado-pasajero">
          <span class="icono-resultado" style="color:#7c3aed">📵</span>
          <span class="hora-resultado" style="color:#7c3aed">Avisó que no va</span>
        </div>`;
      } else {
        accionHTML = '';
      }

      // Sublinea con hora/estado cuando ya está marcado durante en_recorrido
      const colorSublinea = esRecogido ? 'var(--verde)' : esNoEstaba ? 'var(--rojo)' : '#7c3aed';
      const textoSublinea = esRecogido ? marcado.hora : esNoEstaba ? marcado.hora : esAviso ? 'Avisó que no va' : '';
      const sublinea = enRecorrido && marcado
        ? `<div class="pasajero-sublinea" style="color:${colorSublinea}">${textoSublinea}</div>`
        : '';

      li.innerHTML = `
        <div class="pasajero-info">
          <div class="pasajero-nombre">${esc(p.nombre)}</div>
          ${sublinea}
        </div>
        ${accionHTML}`;
      lista.appendChild(li);
    });

    if (enRecorrido) {
      lista.querySelectorAll('.btn-marcar').forEach(btn => {
        btn.addEventListener('click', () => marcarPasajero(btn.dataset.id, btn.dataset.tipo));
      });
    }
  }

  // ── ACCIONES ────────────────────────────────────────────────
  $('btn-iniciar').addEventListener('click', () => {
    if (!estado) return;
    $('btn-iniciar').disabled = true;
    socket.emit('iniciar_recorrido', { codigo: estado.recorrido.codigo });
  });

  $('btn-no-asistir').addEventListener('click', () => {
    if (!estado) return;
    confirmar('¿Confirmás que no vas a asistir hoy?', () => {
      socket.emit('no_asistir', { codigo: estado.recorrido.codigo });
    }, { esRojo: true });
  });

  $('btn-llegar').addEventListener('click', () => {
    if (!estado?.sesion) return;
    const recogidos = estado.retiros.filter(r => r.tipo === 'recogido').length;
    const total = estado.pasajeros.length;
    const sinMarcar = total - estado.retiros.length;
    let msg = `¿Confirmás que llegaste a la oficina?\n${recogidos} recogido${recogidos !== 1 ? 's' : ''}`;
    if (sinMarcar > 0) msg += ` — ${sinMarcar} sin marcar`;
    confirmar(msg, () => {
      $('btn-llegar').disabled = true;
      socket.emit('llegar_oficina', { sesion_id: estado.sesion.id, codigo: estado.recorrido.codigo });
    });
  });

  function marcarPasajero(pasajero_id, tipo) {
    if (!estado?.sesion) return;
    socket.emit('marcar_pasajero', {
      sesion_id: estado.sesion.id,
      pasajero_id: parseInt(pasajero_id),
      codigo: estado.recorrido.codigo,
      tipo,
    });
  }

  // ── SOCKET EVENTS ───────────────────────────────────────────
  socket.on('estado_recorrido', nuevoEstado => {
    estado = nuevoEstado;
    renderizarEstado();
    $('btn-iniciar').disabled = false;
    $('btn-llegar').disabled = false;
  });

  // ── AUTO-LOGIN con localStorage ─────────────────────────────
  const codigoGuardado = localStorage.getItem('codigo');
  if (codigoGuardado) {
    $('input-codigo').value = codigoGuardado;
    ingresar();
  }

  function esc(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── SALIR ───────────────────────────────────────────────────
  function salir() {
    localStorage.removeItem('codigo');
    estado = null;
    $('screen-recorrido').style.display = 'none';
    $('screen-historial').style.display = 'none';
    $('screen-codigo').style.display    = 'flex';
    $('input-codigo').value             = '';
    $('error-codigo').textContent       = '';
  }

  // ── HISTORIAL ───────────────────────────────────────────────
  async function verHistorial() {
    if (!estado) return;
    $('screen-recorrido').style.display = 'none';
    $('screen-historial').style.display = 'flex';

    const res  = await fetch(`/api/chofer/${estado.recorrido.codigo}/historial`);
    const data = await res.json();
    const contenido = $('contenido-historial');

    if (!data.sesiones.length) {
      contenido.innerHTML = '<p style="text-align:center;color:var(--gris);padding:40px 0">Sin historial disponible</p>';
      return;
    }

    const badgeCfg = {
      completado:   { txt: 'Completado',   bg: '#dcfce7', color: '#14532d' },
      en_recorrido: { txt: 'En recorrido', bg: '#fef3c7', color: '#92400e' },
      no_asistio:   { txt: 'No asistió',   bg: '#fee2e2', color: '#991b1b' },
      pendiente:    { txt: 'Pendiente',    bg: '#f1f5f9', color: '#64748b' },
    };
    const tipoCfg = {
      recogido:  { txt: '✓ Recogido',        color: 'var(--verde)' },
      no_estaba: { txt: '✗ No estaba',        color: 'var(--rojo)'  },
      aviso:     { txt: '📵 Avisó que no va', color: '#7c3aed'      },
      pendiente: { txt: 'Pendiente',          color: 'var(--gris)'  },
    };

    contenido.innerHTML = data.sesiones.map((s, i) => {
      const [a, m, d] = s.fecha.split('-');
      const badge = badgeCfg[s.estado] || badgeCfg.pendiente;
      const horas = s.hora_inicio
        ? `Salida: ${s.hora_inicio}${s.hora_llegada ? ' · Llegada: ' + s.hora_llegada : ''}`
        : '';
      return `
        <div class="sesion-card">
          <div class="sesion-card-header" onclick="toggleSesion(${i})">
            <div>
              <div class="sesion-fecha">${d}/${m}/${a}</div>
              <div class="sesion-stats">${s.recogidos} recogidos · ${s.no_estaban} no estaban · ${s.detalle.filter(p=>p.tipo==='aviso').length} avisaron · ${s.total} total</div>
              ${horas ? `<div class="sesion-stats">${horas}</div>` : ''}
            </div>
            <span class="sesion-badge" style="background:${badge.bg};color:${badge.color}">${badge.txt}</span>
          </div>
          <div class="sesion-detalle" id="sesion-${i}">
            ${s.detalle.map(p => {
              const t = tipoCfg[p.tipo] || tipoCfg.pendiente;
              return `<div class="sesion-pasajero-row">
                <span>${esc(p.nombre)}</span>
                <span style="color:${t.color};font-weight:700">${t.txt}${p.hora ? ' ' + p.hora : ''}</span>
              </div>`;
            }).join('')}
          </div>
        </div>`;
    }).join('');
  }

  function toggleSesion(i) {
    document.getElementById(`sesion-${i}`).classList.toggle('abierto');
  }

  function volverDesdeHistorial() {
    $('screen-historial').style.display = 'none';
    $('screen-recorrido').style.display = 'flex';
  }
</script>
</body>
</html>
