<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Choferes - Recorridos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --azul: #1d4ed8;
      --verde: #15803d;
      --rojo: #dc2626;
      --gris: #6b7280;
      --bg: #f1f5f9;
      --card: #ffffff;
      --borde: #e2e8f0;
      --texto: #1e293b;
      --muted: #64748b;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--texto);
      min-height: 100vh;
    }

    .hidden { display: none !important; }

    /* ── MODAL ──────────────────────────────────────────── */
    #modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; padding: 20px;
    }
    .modal-box {
      background: white; border-radius: 14px; padding: 24px;
      max-width: 360px; width: 100%;
    }
    .modal-box h3 { font-size: 17px; margin-bottom: 10px; }
    .modal-box p  { font-size: 14px; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }
    .modal-btns   { display: flex; gap: 10px; }
    .btn-modal-cancel {
      flex: 1; padding: 12px; background: var(--bg); color: var(--texto);
      border: 1px solid var(--borde); border-radius: 8px;
      font-size: 15px; font-weight: 700; cursor: pointer;
    }
    .btn-modal-ok {
      flex: 1; padding: 12px; background: var(--rojo); color: white;
      border: none; border-radius: 8px;
      font-size: 15px; font-weight: 700; cursor: pointer;
    }
    .btn-modal-ok:hover { opacity: 0.9; }
    .btn-modal-ok.azul { background: var(--azul); }
    #modal-input {
      width: 100%; padding: 10px 12px; border: 1px solid var(--borde);
      border-radius: 8px; font-size: 15px; outline: none; margin-bottom: 20px;
    }
    #modal-input:focus { border-color: var(--azul); }

    /* ── LOGIN ──────────────────────────────────────── */
    #screen-login {
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center; background: #0f172a;
    }
    .login-card {
      background: #1e293b; border: 1px solid #334155; border-radius: 16px;
      padding: 40px 36px; width: 100%; max-width: 380px;
    }
    .login-card h2 { color: #f1f5f9; font-size: 22px; font-weight: 700; margin-bottom: 6px; text-align: center; }
    .login-card p  { color: #94a3b8; font-size: 14px; text-align: center; margin-bottom: 28px; }
    .login-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .login-field label { color: #94a3b8; font-size: 13px; font-weight: 600; }
    .login-field input {
      padding: 12px 14px; background: #0f172a; border: 1px solid #334155;
      border-radius: 8px; color: #f1f5f9; font-size: 15px; outline: none;
    }
    .login-field input:focus { border-color: #1d4ed8; }
    .btn-login {
      width: 100%; padding: 14px; background: #1d4ed8; color: white;
      font-size: 16px; font-weight: 700; border: none; border-radius: 8px;
      cursor: pointer; margin-top: 8px;
    }
    .btn-login:hover { opacity: 0.9; }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-error { color: #f87171; font-size: 13px; text-align: center; min-height: 18px; margin-top: 10px; }

    /* ── PANEL ──────────────────────────────────────── */
    #screen-gestion { display: none; }

    header {
      background: #1e293b; color: white; padding: 16px 24px;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 8px;
    }
    header h1 { font-size: 18px; font-weight: 700; }
    .header-usuario { color: #94a3b8; font-size: 13px; margin-right: 16px; }
    .btn-logout {
      background: transparent; color: #f87171; border: 1px solid #f87171;
      padding: 6px 14px; font-size: 13px; font-weight: 700;
      border-radius: 6px; cursor: pointer;
    }
    .btn-logout:hover { background: #f87171; color: white; }

    .container { max-width: 960px; margin: 0 auto; padding: 24px 20px; }
    h2 { font-size: 20px; font-weight: 700; margin-bottom: 16px; }

    /* ── CARDS ──────────────────────────────────────── */
    .card { background: var(--card); border: 1px solid var(--borde); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    .card h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--borde); }

    /* ── FORMULARIO ─────────────────────────────────── */
    .form-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
    .form-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 160px; }
    .form-group label { font-size: 13px; font-weight: 600; color: var(--muted); }
    .form-group input {
      padding: 10px 12px; border: 1px solid var(--borde); border-radius: 8px;
      font-size: 15px; outline: none; background: white;
    }
    .form-group input:focus { border-color: var(--azul); }

    .btn {
      padding: 10px 20px; font-size: 14px; font-weight: 700; border: none;
      border-radius: 8px; cursor: pointer; transition: opacity 0.15s; white-space: nowrap;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-azul { background: var(--azul); color: white; }
    .btn-rojo-sm { background: transparent; color: var(--rojo); border: 1px solid var(--rojo); padding: 5px 10px; font-size: 12px; border-radius: 6px; cursor: pointer; }
    .btn-rojo-sm:hover { background: var(--rojo); color: white; }
    .btn-naranja-sm { background: transparent; color: #d97706; border: 1px solid #d97706; padding: 5px 10px; font-size: 12px; border-radius: 6px; cursor: pointer; }
    .btn-naranja-sm:hover { background: #d97706; color: white; }

    .error-msg { color: var(--rojo); font-size: 13px; margin-top: 8px; min-height: 18px; }

    /* ── LISTA RECORRIDOS ───────────────────────────── */
    .recorrido-bloque { border: 1px solid var(--borde); border-radius: 10px; margin-bottom: 12px; overflow: hidden; }
    .recorrido-header {
      background: #f8fafc; padding: 14px 16px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; cursor: pointer; user-select: none;
    }
    .recorrido-header:hover { background: #f1f5f9; }
    .recorrido-info { flex: 1; }
    .recorrido-nombre { font-size: 16px; font-weight: 700; }
    .recorrido-codigo { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .recorrido-acciones { display: flex; gap: 8px; align-items: center; }
    .badge-count { background: #e2e8f0; color: var(--muted); font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
    .chevron { color: var(--muted); transition: transform 0.2s; }
    .chevron.abierto { transform: rotate(180deg); }

    /* ── PASAJEROS ──────────────────────────────────── */
    .pasajeros-panel { display: none; padding: 16px; border-top: 1px solid var(--borde); background: white; }
    .pasajeros-panel.abierto { display: block; }
    .pasajero-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-radius: 8px; margin-bottom: 6px; background: #f8fafc; font-size: 15px; }
    .form-agregar { display: flex; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--borde); }
    .form-agregar input { flex: 1; padding: 8px 12px; border: 1px solid var(--borde); border-radius: 8px; font-size: 14px; outline: none; }
    .form-agregar input:focus { border-color: var(--azul); }
    .vacío { color: var(--muted); font-size: 14px; padding: 8px 0; }

    /* ── TOAST ──────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      background: #1e293b; color: white; padding: 12px 20px;
      border-radius: 8px; font-size: 14px; font-weight: 600;
      transform: translateY(80px); opacity: 0;
      transition: transform 0.3s, opacity 0.3s; z-index: 999;
    }
    #toast.visible { transform: translateY(0); opacity: 1; }
  </style>
</head>
<body>

<!-- ── MODAL ─────────────────────────────────────────────────── -->
<div id="modal-overlay" class="hidden" onclick="if(event.target===this)cerrarModal()">
  <div class="modal-box">
    <h3 id="modal-titulo"></h3>
    <p id="modal-msg"></p>
    <input id="modal-input" class="hidden" type="text" maxlength="100"
           onkeydown="if(event.key==='Enter') document.getElementById('modal-ok').click()">
    <div class="modal-btns">
      <button class="btn-modal-cancel" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-modal-ok" id="modal-ok">Confirmar</button>
    </div>
  </div>
</div>

<!-- ── LOGIN ─────────────────────────────────────────────── -->
<div id="screen-login">
  <div class="login-card">
    <h2>👥 Gestión de Choferes</h2>
    <p>Ingresá tus credenciales para continuar</p>
    <div class="login-field">
      <label>Usuario</label>
      <input id="login-usuario" type="text" autocomplete="username"
             placeholder="Usuario" onkeydown="if(event.key==='Enter') doLogin()">
    </div>
    <div class="login-field">
      <label>Contraseña</label>
      <input id="login-clave" type="password" autocomplete="current-password"
             placeholder="Contraseña" onkeydown="if(event.key==='Enter') doLogin()">
    </div>
    <button class="btn-login" id="btn-login" onclick="doLogin()">Ingresar</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ── PANEL GESTIÓN ────────────────────────────────────── -->
<div id="screen-gestion">

<header>
  <h1>👥 Gestión de Choferes</h1>
  <nav style="display:flex;align-items:center">
    <span class="header-usuario" id="header-usuario"></span>
    <button class="btn-logout" onclick="doLogout()">Cerrar sesión</button>
  </nav>
</header>

<div class="container">
  <h2>Choferes y Pasajeros</h2>

  <!-- Crear chofer / recorrido -->
  <div class="card">
    <h3>➕ Nuevo Chofer</h3>
    <div class="form-row">
      <div class="form-group">
        <label>Nombre del recorrido / chofer</label>
        <input id="nuevo-nombre" type="text" placeholder="Ej: Recorrido Norte">
      </div>
      <div class="form-group" style="max-width:140px">
        <label>Placa del auto</label>
        <input id="nuevo-codigo" type="text" placeholder="Ej: ABC123" maxlength="10" style="text-transform:uppercase">
      </div>
      <button class="btn btn-azul" onclick="crearRecorrido()">Crear</button>
    </div>
    <div class="error-msg" id="error-crear"></div>
  </div>

  <!-- Lista de choferes con sus pasajeros -->
  <div class="card">
    <h3>🚌 Choferes Registrados</h3>
    <div id="lista-recorridos"><div class="vacío">Cargando...</div></div>
  </div>
</div>

<div id="toast"></div>

</div> <!-- /screen-gestion -->

<script>
  let gestionToken = sessionStorage.getItem('gestionToken') || '';
  let recorridos = [];

  // ── MODAL ──────────────────────────────────────────
  let _modalCb = null;

  function confirmar(titulo, msg, onSi) {
    document.getElementById('modal-titulo').textContent = titulo;
    document.getElementById('modal-msg').textContent = msg;
    _modalCb = onSi;
    document.getElementById('modal-overlay').classList.remove('hidden');
  }

  function cerrarModal() {
    document.getElementById('modal-overlay').classList.add('hidden');
    document.getElementById('modal-input').classList.add('hidden');
    const ok = document.getElementById('modal-ok');
    ok.textContent = 'Confirmar';
    ok.classList.remove('azul');
    _modalCb = null;
  }

  // Modal con campo de texto (para editar nombres)
  function pedirNombre(titulo, valorActual, onOk) {
    document.getElementById('modal-titulo').textContent = titulo;
    document.getElementById('modal-msg').textContent = '';
    const input = document.getElementById('modal-input');
    input.classList.remove('hidden');
    input.value = valorActual;
    const ok = document.getElementById('modal-ok');
    ok.textContent = 'Guardar';
    ok.classList.add('azul');
    _modalCb = () => {
      const nombre = input.value.trim();
      if (nombre && nombre !== valorActual) onOk(nombre);
    };
    document.getElementById('modal-overlay').classList.remove('hidden');
    input.focus();
    input.select();
  }

  document.getElementById('modal-ok').addEventListener('click', () => {
    const cb = _modalCb;
    cerrarModal();
    if (cb) cb();
  });

  // ── AUTH ──────────────────────────────────────────
  // Wrapper que detecta 401 y fuerza re-login
  async function gestionFetch(url, opts = {}) {
    const res = await fetch(url, {
      headers: { 'Content-Type': 'application/json', 'x-gestion-token': gestionToken },
      ...opts,
    });
    if (res.status === 401) {
      sessionStorage.removeItem('gestionToken');
      gestionToken = '';
      document.getElementById('screen-gestion').style.display = 'none';
      document.getElementById('screen-login').style.display = 'flex';
      document.getElementById('login-error').textContent = 'Tu sesión expiró. Iniciá sesión nuevamente.';
      return null;
    }
    return res;
  }

  async function doLogin() {
    const usuario = document.getElementById('login-usuario').value.trim();
    const clave   = document.getElementById('login-clave').value;
    const btn     = document.getElementById('btn-login');
    const errEl   = document.getElementById('login-error');
    if (!usuario || !clave) { errEl.textContent = 'Completá usuario y contraseña'; return; }
    btn.disabled = true; btn.textContent = 'Ingresando...';
    errEl.textContent = '';
    try {
      const res = await fetch('/api/gestion/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ usuario, clave }),
      });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.error || 'Error al ingresar'; return; }
      gestionToken = data.token;
      sessionStorage.setItem('gestionToken', gestionToken);
      sessionStorage.setItem('gestionUsuario', data.usuario || usuario);
      mostrarPanel();
    } finally {
      btn.disabled = false; btn.textContent = 'Ingresar';
    }
  }

  async function doLogout() {
    await fetch('/api/gestion/logout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-gestion-token': gestionToken },
    }).catch(() => {});
    sessionStorage.removeItem('gestionToken');
    sessionStorage.removeItem('gestionUsuario');
    gestionToken = '';
    document.getElementById('screen-gestion').style.display = 'none';
    document.getElementById('screen-login').style.display = 'flex';
    document.getElementById('login-clave').value = '';
    document.getElementById('login-error').textContent = '';
  }

  function mostrarPanel() {
    document.getElementById('screen-login').style.display = 'none';
    document.getElementById('screen-gestion').style.display = 'block';
    const usuario = sessionStorage.getItem('gestionUsuario');
    document.getElementById('header-usuario').textContent = usuario ? `Usuario: ${usuario}` : '';
    cargarRecorridos();
  }

  // Verificar sesión al cargar
  (async () => {
    if (!gestionToken) return;
    const res = await gestionFetch('/api/gestion/recorridos');
    if (res?.ok) mostrarPanel();
  })();

  // ── CHOFERES / RECORRIDOS ─────────────────────────
  async function cargarRecorridos() {
    const res = await gestionFetch('/api/gestion/recorridos');
    if (!res) return;
    recorridos = await res.json();
    renderizarRecorridos();
  }

  function renderizarRecorridos() {
    const lista = document.getElementById('lista-recorridos');
    if (!recorridos.length) {
      lista.innerHTML = '<div class="vacío">No hay choferes. Creá uno arriba.</div>';
      return;
    }

    lista.innerHTML = '';
    recorridos.forEach(r => {
      const bloque = document.createElement('div');
      bloque.className = 'recorrido-bloque';
      bloque.dataset.id = r.id;

      bloque.innerHTML = `
        <div class="recorrido-header" onclick="togglePanel(${r.id})">
          <div class="recorrido-info">
            <div class="recorrido-nombre">${esc(r.nombre)}</div>
            <div class="recorrido-codigo">Placa: <strong>${esc(r.codigo)}</strong></div>
          </div>
          <div class="recorrido-acciones">
            <span class="badge-count">${r.pasajeros.length} persona${r.pasajeros.length !== 1 ? 's' : ''}</span>
            <button class="btn-naranja-sm" onclick="event.stopPropagation();editarNombreRecorrido(${r.id})">Editar</button>
            <span class="chevron" id="chevron-${r.id}">▼</span>
          </div>
        </div>
        <div class="pasajeros-panel" id="panel-${r.id}">
          <div id="pasajeros-${r.id}">
            ${r.pasajeros.length
              ? r.pasajeros.map(p => `
                  <div class="pasajero-item" id="p-${p.id}">
                    <span>${esc(p.nombre)}</span>
                    <span style="display:flex;gap:6px">
                      <button class="btn-naranja-sm" onclick="editarNombrePasajero(${p.id}, ${r.id})">Editar</button>
                      <button class="btn-rojo-sm" onclick="eliminarPasajero(${p.id}, ${r.id})">Quitar</button>
                    </span>
                  </div>`).join('')
              : '<div class="vacío">Sin personas en este recorrido</div>'
            }
          </div>
          <div class="form-agregar">
            <input type="text" id="nuevo-pasajero-${r.id}" placeholder="Nombre de la persona..."
                   onkeydown="if(event.key==='Enter') agregarPasajero(${r.id})">
            <button class="btn btn-azul" onclick="agregarPasajero(${r.id})">Agregar</button>
          </div>
        </div>`;

      lista.appendChild(bloque);
    });
  }

  function togglePanel(recorrido_id) {
    const panel   = document.getElementById(`panel-${recorrido_id}`);
    const chevron = document.getElementById(`chevron-${recorrido_id}`);
    panel.classList.toggle('abierto');
    chevron.classList.toggle('abierto');
  }

  async function crearRecorrido() {
    const nombre = document.getElementById('nuevo-nombre').value.trim();
    const codigo = document.getElementById('nuevo-codigo').value.trim().toUpperCase();
    const err    = document.getElementById('error-crear');
    if (!nombre || !codigo) { err.textContent = 'Completá el nombre y la placa'; return; }

    const res = await gestionFetch('/api/gestion/recorrido', {
      method: 'POST',
      body: JSON.stringify({ nombre, codigo }),
    });
    if (!res) return;

    if (!res.ok) {
      const data = await res.json();
      err.textContent = data.error || 'Error al crear';
      return;
    }

    err.textContent = '';
    document.getElementById('nuevo-nombre').value = '';
    document.getElementById('nuevo-codigo').value = '';
    toast('Chofer creado');
    await cargarRecorridos();
  }

  function editarNombreRecorrido(id) {
    const r = recorridos.find(x => x.id === id);
    pedirNombre('Editar nombre del chofer/recorrido', r?.nombre || '', async (nombre) => {
      const res = await gestionFetch(`/api/gestion/recorrido/${id}`, {
        method: 'PUT',
        body: JSON.stringify({ nombre }),
      });
      if (!res || !res.ok) return;
      toast('Nombre actualizado');
      await cargarRecorridos();
    });
  }

  function editarNombrePasajero(id, recorrido_id) {
    const r = recorridos.find(x => x.id === recorrido_id);
    const p = r?.pasajeros.find(x => x.id === id);
    pedirNombre('Editar nombre de la persona', p?.nombre || '', async (nombre) => {
      const estabaAbierto = document.getElementById(`panel-${recorrido_id}`)?.classList.contains('abierto');
      const res = await gestionFetch(`/api/gestion/pasajero/${id}`, {
        method: 'PUT',
        body: JSON.stringify({ nombre }),
      });
      if (!res || !res.ok) return;
      toast('Nombre actualizado');
      await cargarRecorridos();
      if (estabaAbierto) {
        const panel = document.getElementById(`panel-${recorrido_id}`);
        if (panel && !panel.classList.contains('abierto')) togglePanel(recorrido_id);
      }
    });
  }

  async function agregarPasajero(recorrido_id) {
    const input  = document.getElementById(`nuevo-pasajero-${recorrido_id}`);
    const nombre = input.value.trim();
    if (!nombre) return;

    const res = await gestionFetch('/api/gestion/pasajero', {
      method: 'POST',
      body: JSON.stringify({ nombre, recorrido_id }),
    });
    if (!res || !res.ok) return;

    input.value = '';
    toast(`${nombre} agregado`);
    await cargarRecorridos();

    const panel = document.getElementById(`panel-${recorrido_id}`);
    if (!panel.classList.contains('abierto')) togglePanel(recorrido_id);
  }

  async function eliminarPasajero(id, recorrido_id) {
    const r = recorridos.find(x => x.id === recorrido_id);
    const p = r?.pasajeros.find(x => x.id === id);
    confirmar(
      'Quitar persona',
      `¿Quitar a "${p?.nombre}" del recorrido?`,
      async () => {
        const estabaAbierto = document.getElementById(`panel-${recorrido_id}`)?.classList.contains('abierto');
        const res = await gestionFetch(`/api/gestion/pasajero/${id}`, { method: 'DELETE' });
        if (!res) return;
        toast('Persona eliminada');
        await cargarRecorridos();
        if (estabaAbierto) {
          const panel = document.getElementById(`panel-${recorrido_id}`);
          if (panel && !panel.classList.contains('abierto')) togglePanel(recorrido_id);
        }
      }
    );
  }

  let toastTimer;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('visible');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('visible'), 3000);
  }

  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
